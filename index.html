<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>College Knowledge Quiz</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
</head>

<body>

<header>
    <h1>College History & Courses Quiz</h1>
</header>

<main>
    <section class="quiz-container" aria-live="polite">

        <div class="progress-bar">
            <div id="progress"></div>
        </div>

        <div id="timer">Time Left: <span id="time">15</span>s</div>

        <section id="question-section">
            <h2 id="question">Loading question...</h2>
        </section>

        <section id="options-section" role="radiogroup">
        </section>

        <button id="submit-btn">Submit Answer</button>

        <section id="feedback" aria-live="assertive"></section>

    </section>
</main>


<script src="script.js"></script>
</body>
</html>

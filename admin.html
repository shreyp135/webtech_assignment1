<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Admin Panel - College Quiz</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <h1>Admin Panel</h1>
</header>

<main class="quiz-container">

    <!-- Login Section -->
    <section id="login-section">
        <h2>Admin Login</h2>
        <input type="password" id="admin-password" placeholder="Enter Admin Password">
        <button onclick="login()">Login</button>
        <p id="login-error"></p>
    </section>

    <!-- Admin Controls -->
    <section id="admin-section" style="display:none;">
        <h2>Manage Questions</h2>

        <input type="text" id="question-input" placeholder="Enter Question">

        <input type="text" class="option-input" placeholder="Option 1">
        <input type="text" class="option-input" placeholder="Option 2">
        <input type="text" class="option-input" placeholder="Option 3">
        <input type="text" class="option-input" placeholder="Option 4">

        <input type="number" id="correct-index" placeholder="Correct Option Index (0-3)">
        <textarea id="explanation-input" placeholder="Explanation"></textarea>

        <button onclick="addQuestion()">Add Question</button>

        <h3>Existing Questions</h3>
        <div id="question-list"></div>

        <button onclick="logout()">Logout</button>
    </section>

</main>

<script src="admin.js"></script>
</body>
</html>
